# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    # Paths for VichUploader URI prefixes and API endpoints
    app.parameters:
    app.overview_images_path: '%kernel.project_dir%/public/uploads/images/products/overview'
    app.gallery_images_path: '%kernel.project_dir%/public/uploads/images/products/gallery'
    app.product_model_images_path: '%kernel.project_dir%/public/uploads/images/product_models'
    app.path.product_overview_images: /uploads/products
    app.path.product_images: /uploads/product_images
    app.path.product_variant_images: /uploads/product_variant_images
    app.path.shape_images: /uploads/shapes
    app.path.category_images: /uploads/images/categories
    app.path.color_images: /uploads/images/colors
    app.path.product_model_images: /uploads/images/product_models

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/*'
        exclude:
            - '../src/{DependencyInjection,Entity,Migrations,Tests,Kernel.php}'

    App\Controller\Api\ProductApiController:
        arguments:
            $vichUploaderMappings: '%vich_uploader.mappings%'
        tags: ['controller.service_arguments']

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones
